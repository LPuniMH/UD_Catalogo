services:
  mysql_catalogo:
    image: mysql:latest
    container_name: mysql_catalogo
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=catalogo_db
    volumes:
      - mysql_catalogo_data:/var/lib/mysql
    
  app_catalogo:
    build: .
    container_name: app_catalogo
    restart: on-failure
    depends_on:
      - mysql_catalogo
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql_catalogo:3306/catalogo_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root

volumes:
  mysql_catalogo_data: